<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KADAMAY Portal</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#008080">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* Cute Animations */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .login-card { 
            background: white; 
            width: 90%; 
            max-width: 420px; 
            padding: 40px 30px; 
            border-radius: 25px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
            text-align: center;
            animation: slideIn 0.5s ease-out;
        }
        
        .dashboard { 
            display: none; 
            width: 100%; 
            max-width: 600px; 
            height: 100vh; 
            background: rgba(255,255,255,0.95);
            overflow-y: auto;
            animation: fadeIn 0.3s ease-out;
        }
        
        .header { 
            background: linear-gradient(135deg, #008080 0%, #00a896 100%);
            color: white; 
            padding: 25px 20px 35px; 
            position: relative;
            animation: slideIn 0.4s ease-out;
        }
        
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            position: relative;
            z-index: 10;
        }
        
        .btn-logout {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 13px;
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        
        .btn-logout:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        
        .btn-notif {
            position: relative;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        
        .btn-notif:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }
        
        .badge-dot {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 14px;
            height: 14px;
            background: #ff4757;
            border-radius: 50%;
            border: 3px solid #008080;
            display: none;
            animation: pulseDot 1.5s infinite;
            box-shadow: 0 0 10px rgba(255,71,87,0.8);
        }
        
        @keyframes pulseDot {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        
        .profile-info { 
            text-align: center; 
            margin-top: 15px; 
            position: relative; 
            z-index: 10;
            animation: fadeIn 0.5s ease-out 0.2s both;
        }
        
        .logo-dash { 
            width: 80px; 
            height: 80px; 
            background: white; 
            border-radius: 50%; 
            padding: 8px; 
            margin-bottom: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: transform 0.3s;
        }
        
        .logo-dash:hover {
            transform: rotate(360deg) scale(1.1);
        }
        
        .profile-info h1 { 
            font-size: 22px; 
            font-weight: 700; 
            text-transform: uppercase;
        }
        
        .content { 
            padding: 30px 20px;
            animation: slideInLeft 0.5s ease-out 0.3s both;
        }
        
        .stats-summary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            color: white;
            box-shadow: 0 8px 20px rgba(102,126,234,0.3);
            animation: slideIn 0.5s ease-out 0.4s both;
        }
        
        .stats-row { display: flex; justify-content: space-around; }
        .stat-item { 
            text-align: center;
            transition: transform 0.3s;
        }
        
        .stat-item:hover {
            transform: translateY(-5px);
        }
        
        .stat-label { 
            font-size: 11px; 
            text-transform: uppercase; 
            opacity: 0.9; 
        }
        
        .stat-value { 
            font-size: 24px; 
            font-weight: 700; 
            margin-top: 5px;
            animation: pulse 2s infinite;
        }
        
        .payment-card { 
            background: white;
            padding: 18px; 
            border-radius: 15px; 
            margin-bottom: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            animation: slideInLeft 0.4s ease-out backwards;
        }
        
        /* Stagger animation for cards */
        .payment-card:nth-child(1) { animation-delay: 0.5s; }
        .payment-card:nth-child(2) { animation-delay: 0.6s; }
        .payment-card:nth-child(3) { animation-delay: 0.7s; }
        .payment-card:nth-child(4) { animation-delay: 0.8s; }
        .payment-card:nth-child(n+5) { animation-delay: 0.9s; }
        
        .payment-card.paid { border-left: 5px solid #10b981; }
        .payment-card.unpaid { border-left: 5px solid #ef4444; }
        
        .payment-card:hover { 
            transform: translateX(8px) scale(1.02);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        .pay-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .pay-name { font-weight: 700; font-size: 15px; color: #2c3e50; }
        .pay-date { font-size: 12px; color: #95a5a6; margin-top: 4px; }
        
        .pay-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            color: white;
            transition: all 0.3s;
        }
        
        .pay-badge:hover {
            transform: scale(1.1);
        }
        
        .pay-badge.paid { 
            background: linear-gradient(135deg, #10b981, #059669);
            box-shadow: 0 4px 10px rgba(16,185,129,0.3);
        }
        
        .pay-badge.unpaid { 
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 4px 10px rgba(239,68,68,0.3);
        }
        
        .pay-details { 
            padding: 12px; 
            border-radius: 12px; 
            margin-top: 10px;
            transition: all 0.3s;
        }
        
        .pay-details:hover {
            transform: scale(1.02);
        }
        
        .pay-details.paid { 
            background: rgba(16,185,129,0.1); 
            border: 1px solid rgba(16,185,129,0.3); 
        }
        
        .pay-details.unpaid { 
            background: rgba(239,68,68,0.1); 
            border: 1px solid rgba(239,68,68,0.3); 
        }
        
        input { 
            width: 100%; 
            padding: 16px; 
            margin-bottom: 20px; 
            border: 2px solid #e0e0e0;
            border-radius: 12px; 
            font-size: 18px; 
            text-align: center; 
            text-transform: uppercase;
            transition: all 0.3s;
        }
        
        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
            transform: translateY(-2px);
        }
        
        .btn-main { 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 12px; 
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; 
            font-size: 16px; 
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(102,126,234,0.3);
        }
        
        .btn-main:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(102,126,234,0.4);
        }
        
        .btn-main:active {
            transform: translateY(0);
        }
        
        .loading-overlay { 
            position: fixed; 
            top: 0; 
            width: 100%; 
            height: 100%; 
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; 
            justify-content: center; 
            align-items: center;
            flex-direction: column;
        }
        
        .loading-overlay i {
            animation: spin 1s linear infinite;
        }
        
        /* Smooth scrollbar */
        .dashboard::-webkit-scrollbar {
            width: 6px;
        }
        
        .dashboard::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        .dashboard::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="initLoader" class="loading-overlay">
        <i class="fas fa-circle-notch fa-spin" style="font-size: 50px; color: white;"></i>
        <p style="color: white; margin-top: 20px; font-weight: 700;">LOADING...</p>
    </div>
    
    <div id="loginScreen" class="login-card" style="display:none;">
        <img src="logo.png" alt="Logo" style="width: 120px;">
        <h1 style="background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 32px; margin: 10px 0;">KADAMAY</h1>
        <p style="color:#95a5a6; margin-bottom:30px; font-weight: 600;">Member Portal</p>
        
        <input type="text" id="serialInput" placeholder="ENTER SERIAL ID">
        <button class="btn-main" onclick="verifyMember()">LOGIN</button>
        <p id="loginError" style="color:#e74c3c; font-size:13px; margin-top:15px; display:none;"></p>
    </div>

    <div id="dashboardScreen" class="dashboard">
        <div class="header">
            <div class="top-nav">
                <button class="btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
                
                <button class="btn-notif" onclick="clearNotif()">
                    <i class="fas fa-bell"></i>
                    <span id="notifBadge" class="badge-dot"></span>
                </button>
            </div>
            
            <div class="profile-info">
                <img src="logo.png" alt="Logo" class="logo-dash">
                <h1 id="dashName">...</h1>
                <p id="dashSerial">...</p>
            </div>
        </div>

        <div class="content">
            <div class="stats-summary">
                <div class="stats-row">
                    <div class="stat-item">
                        <div class="stat-label">Total Cases</div>
                        <div class="stat-value" id="statTotal">0</div>
                    </div>
                    <div class="stat-item" style="border-left: 2px solid rgba(255,255,255,0.3); border-right: 2px solid rgba(255,255,255,0.3); padding: 0 15px;">
                        <div class="stat-label">Paid</div>
                        <div class="stat-value" id="statPaid">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Unpaid</div>
                        <div class="stat-value" id="statUnpaid">0</div>
                    </div>
                </div>
            </div>

            <div id="paymentList"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ougkeltvpikpimyqexjc.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_el2jm7Ejz4qDJ4igRZ0mJw_jNEpXJdl';
        const { createClient } = supabase;
        const _db = createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentMemberID = 0;
        let realtimeChannel = null;

        window.onload = function() {
            const saved = localStorage.getItem('kadamay_serial');
            if (saved) {
                document.getElementById('serialInput').value = saved;
                verifyMember();
            } else {
                document.getElementById('initLoader').style.display = 'none';
                document.getElementById('loginScreen').style.display = 'block';
            }
        };

        async function verifyMember() {
            const input = document.getElementById('serialInput').value.trim();
            if (!input) return;

            try {
                let { data, error } = await _db
                    .from('tbl_members')
                    .select('membersid, surname, name, memserial')
                    .eq('memserial', input)
                    .limit(1);

                if (error) throw error;

                if (data && data.length > 0) {
                    localStorage.setItem('kadamay_serial', data[0].memserial);
                    currentMemberID = data[0].membersid;
                    loadDashboard(data[0]);
                } else {
                    document.getElementById('loginError').innerText = "Serial not found";
                    document.getElementById('loginError').style.display = 'block';
                }
            } catch (e) {
                document.getElementById('loginError').innerText = "Connection error";
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function logout() {
            if (confirm("Are you sure you want to logout?")) {
                localStorage.removeItem('kadamay_serial');
                if (realtimeChannel) _db.removeChannel(realtimeChannel);
                
                document.getElementById('dashboardScreen').style.display = 'none';
                document.getElementById('loginScreen').style.display = 'block';
                document.getElementById('serialInput').value = "";
                
                window.history.pushState({}, document.title, window.location.pathname);
            }
        }

        function clearNotif() {
            document.getElementById('notifBadge').style.display = 'none';
        }

        async function loadDashboard(member) {
            document.getElementById('initLoader').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboardScreen').style.display = 'block';

            document.getElementById('dashName').innerText = member.surname + ", " + member.name;
            document.getElementById('dashSerial').innerText = "ID: " + member.memserial;

            fetchPayments(member.membersid);
            subscribeToRealtime(member.membersid);
        }

        function subscribeToRealtime(memberId) {
            if (realtimeChannel) _db.removeChannel(realtimeChannel);
            
            realtimeChannel = _db
                .channel('payment-updates')
                .on(
                    'postgres_changes',
                    { event: 'INSERT', schema: 'public', table: 'tbl_contribution', filter: 'membersid=eq.' + memberId },
                    (payload) => {
                        document.getElementById('notifBadge').style.display = 'block';
                        fetchPayments(memberId);
                    }
                )
                .subscribe();
        }

        async function fetchPayments(memberId) {
            const list = document.getElementById('paymentList');
            list.innerHTML = '<p style="text-align:center; color:#999;">Loading...</p>';

            try {
                // 1. Get ALL mortuary cases
                let mortuaryRes = await _db
                    .from('tbl_mortuary')
                    .select('mortuaryid, dtedied, contributionpermember, tbl_members!deceasedmemberid(surname, name)')
                    .order('dtedied', { ascending: false });

                if (mortuaryRes.error) throw mortuaryRes.error;
                
                const allCases = mortuaryRes.data || [];

                // 2. Get this member's contributions
                const mortuaryIds = allCases.map(m => m.mortuaryid);
                let contribRes = await _db
                    .from('tbl_contribution')
                    .select('mortuaryid, amount, dtepaid, receiptno')
                    .eq('membersid', memberId)
                    .in('mortuaryid', mortuaryIds);

                const contributions = contribRes.data || [];
                const paidMap = {};
                contributions.forEach(c => {
                    paidMap[c.mortuaryid] = c;
                });

                // 3. Build payment cards
                let paidCount = 0;
                let unpaidCount = 0;
                list.innerHTML = '';

                allCases.forEach(m => {
                    const contrib = paidMap[m.mortuaryid];
                    const isPaid = !!contrib;
                    isPaid ? paidCount++ : unpaidCount++;

                    const deceased = m.tbl_members || {};
                    const deceasedName = `${deceased.surname || ''}, ${deceased.name || ''}`.trim();
                    const diedDate = m.dtedied ? new Date(m.dtedied).toLocaleDateString() : '—';
                    const amount = contrib ? contrib.amount : (m.contributionpermember || 50);

                    const card = document.createElement('div');
                    card.className = `payment-card ${isPaid ? 'paid' : 'unpaid'}`;
                    card.innerHTML = `
                        <div class="pay-header">
                            <div>
                                <div class="pay-name">${deceasedName}</div>
                                <div class="pay-date"><i class="fas fa-calendar"></i> ${diedDate}</div>
                            </div>
                            <div class="pay-badge ${isPaid ? 'paid' : 'unpaid'}">
                                ${isPaid ? 'PAID ✓' : 'UNPAID'}
                            </div>
                        </div>
                        <div class="pay-details ${isPaid ? 'paid' : 'unpaid'}">
                            ${isPaid ? `
                                <div style="font-size: 12px; color: #6b7280; margin-bottom: 8px;">
                                    <i class="fas fa-receipt"></i> OR# ${contrib.receiptno} • 
                                    <i class="fas fa-calendar-check"></i> ${new Date(contrib.dtepaid).toLocaleDateString()}
                                </div>
                                <div style="font-size: 18px; font-weight: 700; color: #10b981;">
                                    ₱${amount.toLocaleString()}
                                </div>
                            ` : `
                                <div style="font-size: 13px; color: #ef4444; font-weight: 600;">
                                    <i class="fas fa-exclamation-circle"></i> Payment Required: ₱${amount.toLocaleString()}
                                </div>
                            `}
                        </div>
                    `;
                    list.appendChild(card);
                });

                // Update stats
                document.getElementById('statTotal').innerText = allCases.length;
                document.getElementById('statPaid').innerText = paidCount;
                document.getElementById('statUnpaid').innerText = unpaidCount;

            } catch (e) {
                console.error(e);
                list.innerHTML = '<p style="color:red; text-align:center;">Error loading data</p>';
            }
        }
    </script>
</body>
</html>
